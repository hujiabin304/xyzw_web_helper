name: Build Web to APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup npm mirror
        run: |
          npm config set registry https://registry.npmmirror.com
          npm config set disturl https://npmmirror.com/dist
          npm config set timeout 600000
          npm config set fetch-retries 5

      - name: Install dependencies
        run: npm install --legacy-peer-deps --timeout=600000

      - name: Build project
        run: npm run build

      - name: Install Cordova
        run: npm install -g cordova --registry=https://registry.npmmirror.com

      - name: Build APK
        run: |
          cordova create app io.github.xyzw "XYZWWebHelper" --web-dir dist
          cp -r dist/* app/www/
          cd app
          cordova platform add android@12.0.0 --registry=https://registry.npmmirror.com
          cordova build android --release -- --keystore=none --storePassword=none --password=none --alias=none

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xyzw-apk
          path: app/platforms/android/app/build/outputs/apk/release/*.apk
